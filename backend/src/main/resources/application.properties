# Application properties
spring.application.name=backend
server.port=8081

# Database Connection (Local PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/insteip_db}
spring.datasource.username=${DB_USERNAME:insteip_user}
spring.datasource.password=${DB_PASSWORD:insteip_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate (Automatically creates tables if they don't exist)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File upload settings for Materiales (10MB Limit)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging levels
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# JWT expiration for access tokens (15 minutes)
application.security.jwt.expiration=900000

# Spring Boot Actuator settings
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Central storage path setting (default relative to system's current directory)
application.storage.path=${STORAGE_PATH:uploads}
