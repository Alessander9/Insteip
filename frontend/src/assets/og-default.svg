<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003466"/>
      <stop offset="50%" style="stop-color:#021428"/>
      <stop offset="100%" style="stop-color:#042050"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4db8ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00c9a7;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#006e1c"/>
      <stop offset="100%" style="stop-color:#00a82a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent glow -->
  <ellipse cx="900" cy="200" rx="500" ry="400" fill="url(#accent)"/>
  <ellipse cx="200" cy="500" rx="350" ry="250" fill="url(#accent)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/>
  </g>

  <!-- Badge -->
  <rect x="80" y="80" width="200" height="36" rx="18" fill="url(#badge)"/>
  <text x="180" y="103" font-family="Manrope, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">+5,000 CERTIFICADOS</text>

  <!-- Main title -->
  <text x="80" y="260" font-family="Manrope, Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">INSTEIP</text>

  <text x="80" y="330" font-family="Manrope, Arial, sans-serif" font-size="36" font-weight="500" fill="rgba(255,255,255,0.7)" letter-spacing="-0.5">Instituto de Terapias Integrales</text>

  <!-- Description -->
  <text x="80" y="390" font-family="Manrope, Arial, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.55)">
    <tspan x="80" dy="0">Cursos online con certificación internacional</tspan>
    <tspan x="80" dy="30">Acupuntura · Auriculoterapia · Masaje Terapéutico</tspan>
  </text>

  <!-- CTA pill -->
  <rect x="80" y="460" width="260" height="48" rx="24" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="210" y="490" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">INFORMACIÓN Y MATRÍCULA</text>

  <!-- Footer bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.2)"/>
  <text x="80" y="610" font-family="Manrope, Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.4)">insteip.com</text>
  <text x="1120" y="610" font-family="Manrope, Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.4)" text-anchor="end">Lima, Perú</text>
</svg>
