<!DOCTYPE html>
<html class="scroll-smooth" lang="es">
<head>
  <base href="/">
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>INSTEIP - Terapias Integrales Virtuales</title>
  <script>
    (function () {
      try {
        const themeKey = 'insteip-theme';
        const savedTheme = localStorage.getItem(themeKey);
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const shouldBeDark = savedTheme === 'dark' || (!savedTheme && prefersDark);

        if (shouldBeDark) {
          document.documentElement.classList.add('dark');
        }
      } catch (error) {
        // If storage or matchMedia is unavailable, fall back to the default theme.
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Hanken+Grotesk:wght@600&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "on-primary": "#ffffff",
                  "primary-fixed": "#d5e3ff",
                  "on-primary-container": "#93bcfc",
                  "surface": "#f8faf8",
                  "on-tertiary-fixed": "#131e17",
                  "background": "#f8faf8",
                  "surface-container-high": "#e6e9e7",
                  "on-tertiary-fixed-variant": "#3e4a41",
                  "on-tertiary": "#ffffff",
                  "surface-container-low": "#f2f4f2",
                  "on-secondary": "#ffffff",
                  "on-error": "#ffffff",
                  "surface-variant": "#e1e3e1",
                  "surface-bright": "#f8faf8",
                  "on-surface": "#191c1b",
                  "surface-tint": "#335f99",
                  "secondary-fixed-dim": "#78dc77",
                  "error-container": "#ffdad6",
                  "tertiary": "#2b362e",
                  "surface-container-highest": "#e1e3e1",
                  "error": "#ba1a1a",
                  "secondary-container": "#91f78e",
                  "on-background": "#191c1b",
                  "inverse-surface": "#2e3130",
                  "surface-container": "#eceeec",
                  "on-secondary-fixed": "#002204",
                  "primary": "#003466",
                  "on-error-container": "#93000a",
                  "surface-dim": "#d8dad9",
                  "on-primary-fixed": "#001c3b",
                  "secondary": "#006e1c",
                  "on-primary-fixed-variant": "#144780",
                  "outline-variant": "#c3c6d1",
                  "primary-container": "#1a4b84",
                  "on-surface-variant": "#424750",
                  "tertiary-fixed": "#d9e6da",
                  "secondary-fixed": "#94f990",
                  "surface-container-lowest": "#ffffff",
                  "primary-fixed-dim": "#a6c8ff",
                  "inverse-primary": "#a6c8ff",
                  "on-tertiary-container": "#b1beb2",
                  "on-secondary-container": "#00731e",
                  "on-secondary-fixed-variant": "#005313",
                  "tertiary-container": "#414d45",
                  "inverse-on-surface": "#eff1ef",
                  "outline": "#737781",
                  "tertiary-fixed-dim": "#bdcabe"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "section-gap": "80px",
                  "margin-mobile": "16px",
                  "container-max": "1280px",
                  "base": "8px",
                  "margin-desktop": "40px",

                  "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                  "caption": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],

    }

<body class="bg-surface text-on-surface dark:bg-slate-950 dark:text-slate-100 font-body-md antialiased overflow-x-hidden transition-colors duration-300">
  <!-- Splash Screen -->
  <div id="splash-screen" class="fixed inset-0 z-[99999] flex flex-col items-center justify-center bg-[#020b1a] transition-opacity duration-500" style="opacity: 1;">
    <div class="flex flex-col items-center gap-6" style="animation: splash-pulse 2s ease-in-out infinite;">
      <img src="assets/insteip-logo.png" alt="INSTEIP Logo" class="h-16 md:h-20 object-contain max-w-[280px] select-none pointer-events-none">
      <div class="flex flex-col items-center gap-3">
        <div class="w-8 h-8 rounded-full border-4 border-slate-700 border-t-[#4db8ff] animate-spin"></div>
        <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">Cargando campus virtual...</p>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const splash = document.getElementById('splash-screen');
      if (splash) {
        const hideSplash = () => {
          splash.style.opacity = '0';
          setTimeout(() => {
            if (splash.parentNode) {
              splash.parentNode.removeChild(splash);
            }
          }, 500);
        };
        
        window.addEventListener('load', () => {
          setTimeout(hideSplash, 400);
        });

        // Safety fallback
        setTimeout(hideSplash, 3500);
      }
    })();
  </script>

  <app-root></app-root>
</body>
</html>
