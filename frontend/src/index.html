<body class="bg-surface text-on-surface dark:bg-slate-950 dark:text-slate-100 font-body-md antialiased overflow-x-hidden transition-colors duration-300">
  <!-- Splash Screen -->
  <style>
    @keyframes splash-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.03); opacity: 0.85; }
    }
    @keyframes spin-slow {
      to { transform: rotate(360deg); }
    }
    @keyframes splash-fade-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .splash-logo     { animation: splash-pulse 2s ease-in-out infinite; }
    .splash-spinner  { animation: spin-slow 0.8s linear infinite; }
    .splash-text     { animation: splash-fade-in 0.6s ease-out both; animation-delay: 0.2s; }
  </style>
  <div id="splash-screen" class="fixed inset-0 z-[99999] flex flex-col items-center justify-center bg-[#020b1a] transition-opacity duration-500" style="opacity: 1;">
    <div class="flex flex-col items-center gap-6 splash-logo">
      <img src="assets/insteip-logo.png" alt="INSTEIP Logo" fetchpriority="high" class="h-16 md:h-20 object-contain max-w-[280px] select-none pointer-events-none">
      <div class="flex flex-col items-center gap-3 splash-text">
        <div class="w-8 h-8 rounded-full border-4 border-slate-700 border-t-[#4db8ff] splash-spinner"></div>
        <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">Cargando campus virtual...</p>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const splash = document.getElementById('splash-screen');
      if (splash) {
        const hideSplash = () => {
          splash.style.opacity = '0';
          setTimeout(() => {
            if (splash.parentNode) {
              splash.parentNode.removeChild(splash);
            }
          }, 500);
        };
        
        window.addEventListener('load', () => {
          setTimeout(hideSplash, 400);
        });

        // Safety fallback
        setTimeout(hideSplash, 3500);
      }
    })();
  </script>
