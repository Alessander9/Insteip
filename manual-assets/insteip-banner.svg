<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">INSTEIP Banner</title>
  <desc id="desc">Banner para el proyecto INSTEIP con estilo moderno y fondo degradado.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1480" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.55" stop-color="#0B4F6C"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="accent" x1="280" y1="90" x2="1320" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#E2E8F0" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>
  <rect width="1600" height="420" rx="40" fill="url(#bg)"/>
  <circle cx="260" cy="88" r="120" fill="#22C55E" fill-opacity="0.16" filter="url(#blur)"/>
  <circle cx="1360" cy="86" r="140" fill="#38BDF8" fill-opacity="0.16" filter="url(#blur)"/>
  <circle cx="1380" cy="330" r="180" fill="#F59E0B" fill-opacity="0.10" filter="url(#blur)"/>
  <path d="M140 292C280 210 380 188 540 204C680 218 776 266 936 272C1112 278 1226 208 1460 154" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 14" opacity="0.9"/>
  <path d="M138 324C312 248 414 230 552 238C702 248 812 302 976 304C1148 306 1260 246 1462 184" stroke="#E2E8F0" stroke-opacity="0.28" stroke-width="2" stroke-linecap="round"/>
  <g transform="translate(120 112)">
    <rect x="0" y="0" width="132" height="132" rx="28" fill="#FFFFFF" fill-opacity="0.12" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <path d="M28 92V40L66 22L104 40V92L66 110L28 92Z" fill="#F8FAFC" fill-opacity="0.92"/>
    <path d="M66 22V110" stroke="#0F172A" stroke-opacity="0.14" stroke-width="4"/>
    <path d="M28 40L66 60L104 40" stroke="#0F172A" stroke-opacity="0.14" stroke-width="4"/>
  </g>
  <text x="292" y="158" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="24" letter-spacing="6" font-weight="700" opacity="0.82">INSTEIP</text>
  <text x="292" y="226" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="66" font-weight="800">Campus Virtual</text>
  <text x="292" y="288" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">Plataforma e-learning modular con backend Spring Boot, frontend Angular y PostgreSQL.</text>
  <g transform="translate(292 322)">
    <rect x="0" y="0" width="140" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.14" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <text x="70" y="27" text-anchor="middle" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Spring Boot 3</text>
    <rect x="156" y="0" width="122" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.14" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <text x="217" y="27" text-anchor="middle" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Angular</text>
    <rect x="294" y="0" width="130" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.14" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <text x="359" y="27" text-anchor="middle" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">PostgreSQL</text>
